name: Build Delavan Lake Watershed Parcel List

on:
  workflow_dispatch:

jobs:
  build-parcel-list:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parcel extraction
        run: |
          python scripts/extract_delavan_parcels.py

      - name: Upload parcel spreadsheet
        uses: actions/upload-artifact@v4
        with:
          name: delavan-lake-watershed-tax-parcels
          path: outputs/*.xlsx
